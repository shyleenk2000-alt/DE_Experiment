<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <style>
    .box { fill:#ffffff; stroke:#2b6cb0; stroke-width:2; rx:6; }
    .fact { fill:#fff7ed; stroke:#d69e2e; }
    .title { font: bold 14px sans-serif; fill:#1a202c; }
    .field { font: 12px monospace; fill:#2d3748; }
    .fk { stroke:#2d3748; stroke-width:2; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#2d3748" />
    </marker>
  </defs>

  <!-- Fact table (center) -->
  <g transform="translate(300,200)">
    <rect class="box fact" x="220" y="120" width="360" height="260" rx="8"/>
    <text class="title" x="400" y="145" text-anchor="middle">fact_sales</text>
    <text class="field" x="260" y="175">sales_key (PK)</text>
    <text class="field" x="260" y="195">date_key (FK → dim_date.date_key)</text>
    <text class="field" x="260" y="215">ship_date_key (FK → dim_date.date_key)</text>
    <text class="field" x="260" y="235">location_key (FK → dim_location)</text>
    <text class="field" x="260" y="255">shop_key (FK → dim_shop)</text>
    <text class="field" x="260" y="275">product_key (FK → dim_product)</text>
    <text class="field" x="260" y="295">customer_key (FK → dim_customer)</text>
    <text class="field" x="260" y="315">sales_person_key (FK → dim_sales_person)</text>
    <text class="field" x="260" y="335">sale_price, cost_price, discount_amount, finance_amount...</text>
  </g>

  <!-- dim_date (top) -->
  <g transform="translate(380,30)">
    <rect class="box" x="0" y="0" width="220" height="110" rx="6"/>
    <text class="title" x="110" y="22" text-anchor="middle">dim_date</text>
    <text class="field" x="10" y="45">date_key (PK, YYYYMMDD)</text>
    <text class="field" x="10" y="65">full_date, year, quarter, month, day, weekday</text>
  </g>

  <!-- dim_location (left) -->
  <g transform="translate(60,200)">
    <rect class="box" x="0" y="0" width="220" height="110" rx="6"/>
    <text class="title" x="110" y="22" text-anchor="middle">dim_location</text>
    <text class="field" x="10" y="45">location_key (PK)</text>
    <text class="field" x="10" y="65">continent, country_or_state, province_or_city</text>
  </g>

  <!-- dim_shop (left-bottom) -->
  <g transform="translate(60,380)">
    <rect class="box" x="0" y="0" width="220" height="90" rx="6"/>
    <text class="title" x="110" y="22" text-anchor="middle">dim_shop</text>
    <text class="field" x="10" y="45">shop_key (PK)</text>
    <text class="field" x="10" y="65">shop_name, shop_age</text>
  </g>

  <!-- dim_product (right-bottom) -->
  <g transform="translate(820,380)">
    <rect class="box" x="0" y="0" width="240" height="110" rx="6"/>
    <text class="title" x="120" y="22" text-anchor="middle">dim_product</text>
    <text class="field" x="10" y="45">product_key (PK)</text>
    <text class="field" x="10" y="65">pc_make, pc_model, storage_type, storage_capacity, ram</text>
    <text class="field" x="10" y="85">pc_market_price</text>
  </g>

  <!-- dim_customer (right) -->
  <g transform="translate(820,200)">
    <rect class="box" x="0" y="0" width="240" height="110" rx="6"/>
    <text class="title" x="120" y="22" text-anchor="middle">dim_customer</text>
    <text class="field" x="10" y="45">customer_key (PK)</text>
    <text class="field" x="10" y="65">customer_name, customer_surname</text>
    <text class="field" x="10" y="85">contact_number, email</text>
  </g>

  <!-- dim_sales_person (top-right) -->
  <g transform="translate(620,30)">
    <rect class="box" x="0" y="0" width="220" height="90" rx="6"/>
    <text class="title" x="110" y="22" text-anchor="middle">dim_sales_person</text>
    <text class="field" x="10" y="45">sales_person_key (PK)</text>
    <text class="field" x="10" y="65">sales_person_name, department</text>
  </g>

  <!-- connectors from fact to dims -->
  <line class="fk" x1="400" y1="200" x2="490" y2="140" /> <!-- to dim_date -->
  <line class="fk" x1="520" y1="360" x2="920" y2="360" /> <!-- to dim_product -->
  <line class="fk" x1="520" y1="260" x2="920" y2="260" /> <!-- to dim_customer -->
  <line class="fk" x1="300" y1="260" x2="170" y2="260" /> <!-- to dim_location -->
  <line class="fk" x1="300" y1="360" x2="170" y2="420" /> <!-- to dim_shop -->
  <line class="fk" x1="520" y1="140" x2="700" y2="110" /> <!-- to dim_sales_person -->

  <!-- small legend -->
  <g transform="translate(30,620)">
    <rect x="0" y="0" width="400" height="60" rx="6" fill="#f7fafc" stroke="#cbd5e0"/>
    <text class="field" x="10" y="20">Star schema: central fact (`fact_sales`) with dimension tables linked by surrogate keys.</text>
    <text class="field" x="10" y="40">PK = primary key, FK = foreign key (references shown).</text>
  </g>

</svg>
